name: 🌍 Funding Opportunities Agent

on:
  schedule:
    # Runs daily at 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit docs/opportunities.json back to main

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run agent (scan + save dashboard JSON) ───────────────────────────
      - name: Run funding agent
        env:
          ALERT_EMAIL_FROM:     ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO:       ${{ secrets.ALERT_EMAIL_TO }}
          # ReliefWeb appname is baked in as default; override here if needed
          # RELIEFWEB_APPNAME: ridhismriti-research-8yzpu
          SIMPLER_GRANTS_API_KEY: ${{ secrets.SIMPLER_GRANTS_API_KEY }}
          UN_PORTAL_TOKEN:        ${{ secrets.UN_PORTAL_TOKEN }}
        run: python run_agent.py --now --save-json

      # ── 5. Commit updated files back to main ────────────────────────────────
      #    docs/opportunities.json  → powers the GitHub Pages dashboard
      #    data/processed/agent_seen_opportunities.json → persists "seen" state
      #    so re-runs don't re-alert on the same opportunities
      - name: Commit updated data
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/opportunities.json
          git add data/processed/agent_seen_opportunities.json || true
          git diff --staged --quiet \
            || git commit -m "chore: update funding opportunities [skip ci]"
          git push
